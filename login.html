<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">


</head>
<body>
    <div class="login">
        <form class="login-form-wrapper">
            <div class="right-form">
                
                <span><span class="logo-icon">📚</span>NoteNest</span>
                <p>your Nest of Notes</p>
            </div>
            <section class="left-form">
                <div class="logo-container">
                    <span class="logo-icon">📚</span> 
                    <span class="logo-text">NotesNest</span>
                </div>
                <div class="welcome-title" style="text-align: start; margin-top: 2%;">
                    <h1 >Welcome Back!</h1>
                    <p>Login to continue your learning journey.</p>
                </div>
                <div class="input-group">
                    
                        <label for="email">✉️</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    
                </div>

                <div class="input-group">
                    
                        <label for="password">🔒</label>
                        <input type="password" id="password" placeholder="password" required>
                        
                </div>

                <div class="forgot-password-container">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>

                <div class="divider">
                    or
                </div>

                <button type="button" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-icon">
                    Continue with Google
                </button>

                <p class="signup-text">Don't have an account? <a href="#" style="color: cornflowerblue;">Sign up</a></p>
            </section>
        </form>
    </div>
</body>
</html>
