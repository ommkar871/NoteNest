<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo1.jpg">
    <title>NoteNest</title>
    <link rel="stylesheet" href="landing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <div class="herosection">
    <div class="hidden-herosection">
        <div><span><span style="color: #5b9cd7;">OUTR</span></span><span style="color: #163f7a;">DIGITAL</span> LIBRARY</div>
    </div>
    <div class="main-herosection">
        <div class="wrapper"> 
            <video id="bg-video" muted playsinline  >
            <source src="./assets/landingvideo.mp4" type="video/mp4">
            Your browser does not support the video tag.
            </video>
        </div>
        <div class="search-section hidden" id="search-section">
            <h1>Find Your Cycle Notes</h1>
            <form id="notes-form">
                <input type="text" id="cycle-input" placeholder="Enter cycle.." required>
                <button type="submit">Continue</button>
            </form>
        </div>
    </div>
  </div>
